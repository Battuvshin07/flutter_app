name: flutter_app
description: A Mongol Empire history learning app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.14.0
  cloud_functions: ^4.6.0
  firebase_storage: ^11.6.0

  # Google Sign-In
  google_sign_in: ^6.2.1

  # Image Picking
  image_picker: ^1.0.0

  # State Management
  provider: ^6.1.1

  # UI
  google_fonts: ^6.1.0
  lucide_flutter: ^0.563.0
  youtube_player_flutter: ^9.1.1

  cupertino_icons: ^1.0.2
  flutter_earth_globe: ^2.2.0

  # Backend layer
  sqflite: ^2.3.0
  path: ^1.8.0
  encrypt: ^5.0.3
  flutter_secure_storage: ^9.0.0
  connectivity_plus: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/achievements/
    - assets/data/
    - assets/maps/