name: flutter_app
description: A Mongol Empire history learning app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.24.2
  cloud_firestore: ^4.14.0

  # State Management
  provider: ^6.1.1

  # UI
  google_fonts: ^6.1.0
  lucide_flutter: ^0.563.0

  cupertino_icons: ^1.0.2
  flutter_earth_globe: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/data/
    - assets/maps/
